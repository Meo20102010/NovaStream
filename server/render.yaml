services:
  - type: web
    name: novastream-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: novastream-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STORAGE_PATH
        value: ./storage
      - key: UPLOAD_DIR
        value: ./storage/uploads
      - key: THUMBNAIL_DIR
        value: ./storage/thumbnails
      - key: POSTER_DIR
        value: ./storage/posters

databases:
  - name: novastream-db
    plan: free
    databaseName: novastream
    user: novastream
